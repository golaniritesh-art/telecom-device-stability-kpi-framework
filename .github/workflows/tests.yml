name: Run Data Pipeline Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate telemetry data
        run: |
          python src/generate_data.py

      - name: Run ingestion pipeline
        run: |
          python src/ingest.py

      - name: Run Pytest data quality tests
        run: |
          pytest tests -v

      - name: Run Robot Framework telecom tests
        run: |
          robot --outputdir robot_results robot_tests

      - name: Upload Robot Framework reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-framework-reports
          path: robot_results
